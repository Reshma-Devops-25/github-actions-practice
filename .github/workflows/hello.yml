# Workflow
name: Hello

#On tells when the worflow shoud run*Give indentation)
on:
  workflow_dispatch: 

#Job tells what the workflow should do, there can be one or more than one jobs, hence we write Jobs
# Jobs is an object so needs indentation
jobs:  
  # 1st Job (give indentation)
  say-hello:
    # Creates an Ephermal Catainer with ubuntu running
    runs-on: ubuntu-latest
    # That ephermal caontainer will have steps to execute, hence name those steps and use run: run has the command
    steps:
      - name: Say hello to everyone
        run: echo "Hello Everyne"
